    }

    /* Print Styles */
    @media print {
      body {
        background: white !important;
      }

      .no-print {
        display: none !important;
      }

      .print-only {
        display: block !important;
      }

      .print-page-break {
        page-break-after: always;
      }

      .print-avoid-break {
        page-break-inside: avoid;
      }

      @page {
        margin: 2cm;
        size: A4;
      }

      .print-header {
        display: block;
        text-align: center;
        font-weight: bold;
        font-size: 18px;
        margin-bottom: 20px;
        border-bottom: 2px solid #000;
        padding-bottom: 10px;
      }

      .print-section {
        margin-bottom: 30px;
      }

      .print-section h3 {
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 10px;
        border-bottom: 1px solid #333;
        padding-bottom: 5px;
      }

      .print-section p {
        font-size: 12px;
        line-height: 1.6;
        margin-bottom: 10px;
      }
    }

    .no-print {
      display: none;
    }

    .print-only {
      display: none;
    }

    /* Prevent auto-zoom on mobile */
    @media screen and (max-width: 768px) {

      input,
      textarea,
      select {
        font-size: 16px !important;
      }
    }
  </style>
</head>

<body>
  <script>
    window.onerror = function (msg, url, line, col, error) {
      // Show error on screen for debugging
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = `
          <div style="color: red; padding: 20px; font-family: monospace; background: #fff0f0; border: 2px solid red;">
            <h3>Application Error</h3>
            <p><strong>Message:</strong> ${msg}</p>
            <p><strong>Line:</strong> ${line}:${col}</p>
            <pre>${error ? error.stack : 'No stack trace'}</pre>
          </div>
        `;
      }
      return false;
    };
    window.onunhandledrejection = function (event) {
      console.error("Unhandled Rejection:", event.reason);
    };
  </script>
  <div id="root"></div>

  <script>
    window.__app_id = 'care-record-pro-netlify';
  </script>

  <script type="text/babel" data-presets="react">
    // --- UMD Globals Setup ---
    const { useState, useEffect, useCallback } = React;
    const { createRoot } = ReactDOM;

    // Netlify Storage Helper with LocalStorage Fallback
    const callStorage = async (payload) => {
      const performLocalAction = (payload) => {
        const { action, key, data, childId, messageId, date } = payload;
        const get = (k) => {
          try {
            return JSON.parse(localStorage.getItem('care_pro_local_' + k) || 'null');
          } catch (e) { return null; }
        };
        const set = (k, v) => localStorage.setItem('care_pro_local_' + k, JSON.stringify(v));

        switch (action) {
          case "getChildren":
            return get("children") || [];
          case "setChildren":
            set("children", data);
            return { status: "OK" };
          case "getMessages":
            return get(`messages_${childId}`) || [];
          case "saveMessages":
            set(`messages_${childId}`, data);
            return { status: "OK" };
          case "getReport":
            return get(`report_${date}`) || null;
          case "saveReport":
            set(`report_${date}`, data);
            // Update index
            let index = get("reports_index") || [];
            if (!Array.isArray(index)) index = [];
            if (!index.includes(date)) {
              index.push(date);
              set("reports_index", index);
            }
            return { status: "OK" };
          case "getReportIndex":
            return get("reports_index") || [];
          default:
            return null;
        }
      };

      try {
        // Force local if known local environment
        const isLocal = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

        if (isLocal) {
          // console.log("Using LocalStorage (Local Mode):", payload.action);
          return performLocalAction(payload);
        }

        const response = await fetch('/.netlify/functions/storage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          // Fallback to local storage on 404 (local server without functions) or other errors
          console.warn(`Storage API Error (${response.status}), falling back to localStorage.`);
          return performLocalAction(payload);
        }
        const data = await response.json();
        return data;
      } catch (e) {
        console.warn("Storage Connection Error, falling back to localStorage:", e);
        return performLocalAction(payload);
      }
    };
    const { icons } = lucide;

    const fetchAI = async (prompt, isJson) => {
      // Client-side Gemini Call for Local/Preview
      const callGeminiDirectly = async (apiKey, prompt, isJson) => {
        const MODEL = 'gemini-2.5-flash';
        const ENDPOINT = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`;

        const response = await fetch(ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.7 }
          })
        });

        const data = await response.json();
        if (!response.ok || data.error) {
          throw new Error(data.error?.message || 'Gemini API Error');
        }

        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        let parsed = null;
        if (isJson && text) {
          try {
            const jsonMatch = text.match(/\{[\s\S]*\}/);
            parsed = jsonMatch ? JSON.parse(jsonMatch[0]) : JSON.parse(text);
          } catch (_) { parsed = null; }
        }
        return isJson ? parsed : text;
      };

      try {
        // ALWAYS try to use the Local Storage API Config Key first if it exists.
        // This allows users to override the server-side function behavior or use it in preview environments without server functions.
        let apiKey = localStorage.getItem('care_pro_gemini_key');

        if (apiKey) {
          console.log("Using Configured API Key for Gemini (Client-side)");
          try {
            return await callGeminiDirectly(apiKey, prompt, isJson);
          } catch (geminiError) {
            console.error("Gemini Direct Call Error:", geminiError);

            // Specific handling for Quota Exceeded (429)
            if (geminiError.message && (geminiError.message.includes('429') || geminiError.message.includes('quota') || geminiError.message.includes('Quota'))) {
              alert("AIサービスの利用制限（回数制限）に達しました。\n\nしばらく時間（1分程度）を空けてから再度お試しください。\n※これは無料版APIの仕様です。");
              // Do NOT throw to fallback, stop here to let user retry later with real key
              throw new Error("QUOTA_EXCEEDED_STOP");
            }

            alert("AI生成エラー (Google API): " + geminiError.message + "\n\nキーが正しいか確認してください。");
            throw geminiError; // Fallback to demo for other errors
          }
        }

        // If no key is configured, check environment
        const isLocal = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_URL = '/.netlify/functions/gemini';

        if (isLocal) {
          // Local mode without a key -> Fail to Mock
          console.log("No Local API Key found in Local Mode, using Demo");
          throw new Error("No API Key provided for local mode");
        }

        console.log("Calling API Endpoint:", API_URL);
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, isJson })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'AI呼び出しに失敗しました');

        if (isJson) return data.parsed || null;
        return data.text;
      } catch (e) {
        console.warn("AI API Error/Local Mode:", e);

        // Mock Fallback
        const getMockResponse = (isJson) => {
          if (isJson) {
            return {
              B_result: "【デモ生成】本日は集中して学習に取り組みました。特に計算プリントでは、指を使って丁寧に数える姿が見られました。（※実際のAI生成を行うにはAPIキーを設定してください）",
              B_plan: "引き続き、個々のペースに合わせた学習支援を行い、自信を持って取り組めるようサポートしていきます。",
              B_item: "①健康管理, ③社会性",
              D: "こんにちは、〇〇です！今日のツリー通信です！\n\n【デモ生成】今日は学習の時間にとても集中して取り組んでいましたよ。スタッフと一緒にプリントの問題を解く中で、「できた！」と嬉しそうに報告してくれる場面もありました。休憩時間にはお友達と仲良くブロックで遊んでおり、穏やかに過ごせていました。\n\n（※プレビューで実際の生成を行うには、生成時にAPIキーを入力してください）"
            };
          }
          return "【デモ生成】本日は全体的に穏やかに過ごせました。個々の課題にも前向きに取り組む姿が見られ、大きなトラブルもなく順調な一日でした。";
        };

        await new Promise(r => setTimeout(r, 1000));
        return getMockResponse(isJson);
      }
    };

    // Load Vanilla Lucide Icons

    // Lucide React Adapter
    const createIcon = (iconName, iconNode) => {
      const Component = ({ color = 'currentColor', size = 24, strokeWidth = 2, className, ...props }) => {
        const [tag, attrs, children] = iconNode;
        return React.createElement(
          tag,
          {
            ...attrs,
            width: size,
            height: size,
            stroke: color,
            strokeWidth: strokeWidth,
            className: `lucide lucide-${iconName} ${className || ''}`,
            ...props
          },
          children.map(([childTag, childAttrs], index) =>
            React.createElement(childTag, { ...childAttrs, key: index })
          )
        );
      };
      Component.displayName = iconName;
      return Component;
    };

    // Create adapter object for all icons
    const Lucide = Object.fromEntries(
      Object.entries(icons).map(([k, v]) => [k, createIcon(k, v)])
    );

    // Destructure icons needed by the user code
    const {
      Users, Clock, FileText, MessageSquare, UsersRound, Send, Loader2, Copy, Check,
      PlusCircle, Trash2, ClipboardCheck, RefreshCw, BookOpen, Coffee, Activity, Smile, Cloud, Clipboard,
      ShieldCheck, Printer, FileSpreadsheet, Sparkles, Calendar, X, ChevronLeft, ChevronRight, Settings
    } = Lucide;

    // --- App Code ---
    const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'care-record-pro-netlify';
    // Staff Options
    const STAFF_OPTIONS = ['ブラック', 'パープル', 'さくら', 'ブラウン', 'ブルー', 'ネイビー'];

    // App Version
    // App Version
    const APP_VERSION = typeof window.__app_version !== 'undefined' ? window.__app_version : '26.02.07.6';

    const CopyButton = ({ text, id, label }) => {
      const [copied, setCopied] = useState(false);
      const handleCopy = () => {
        if (!text) return;
        const markCopied = () => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        };

        // Prefer async Clipboard API when available (requires HTTPS/localhost)
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(markCopied).catch((err) => {
            console.warn('Async clipboard failed, falling back:', err);
            fallbackCopy(text, markCopied);
          });
        } else {
          fallbackCopy(text, markCopied);
        }
      };

      // Fallback for http/file origins
      const fallbackCopy = (value, onSuccess) => {
        try {
          const textarea = document.createElement('textarea');
          textarea.value = value;
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          onSuccess();
        } catch (err) {
          console.error('Clipboard fallback failed:', err);
        }
      };
      return (
        <button onClick={handleCopy} className="text-slate-400 hover:text-indigo-600 transition-colors flex items-center gap-1" title="Copy">
          {copied ? <Check className="w-3 h-3 text-emerald-500" /> : <Copy className="w-3 h-3" />}
          {label && <span className="text-[10px] font-bold">{label}</span>}
        </button>
      );
    };


    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true };
      }

      componentDidCatch(error, errorInfo) {
        this.setState({ error, errorInfo });
        console.error("ErrorBoundary caught an error", error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-red-50 p-4">
              <div className="text-red-800 max-w-lg">
                <h1 className="text-2xl font-bold mb-4">エラーが発生しました</h1>
                <p className="mb-4">アプリケーションで予期せぬエラーが発生しました。</p>
                <details className="whitespace-pre-wrap font-mono text-xs bg-red-100 p-4 rounded mb-4 overflow-auto max-h-64">
                  {this.state.error && this.state.error.toString()}
                  <br />
                  {this.state.errorInfo && this.state.errorInfo.componentStack}
                </details>
                <button onClick={() => window.location.reload()} className="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 font-bold transition-colors shadow-sm">
                  ページを再読み込み
                </button>
              </div>
            </div>
          );
        }

        return this.props.children;
      }
    }


    const App = () => {
      // Mock user for demo if auth fails
      const [user, setUser] = useState(null);
      const [children, setChildren] = useState([]);
      const [results, setResults] = useState({});
      const [summaryC, setSummaryC] = useState('');
      const [dailyMessages, setDailyMessages] = useState({}); // New: Messages per child for the specific date
      const [selectedChildId, setSelectedChildId] = useState(null);
      const [selectedGenerateIds, setSelectedGenerateIds] = useState([]);
      const [loading, setLoading] = useState(false);

      const [copiedId, setCopiedId] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [progress, setProgress] = useState(0);
      const [smoothProgress, setSmoothProgress] = useState(0);
      const [editingMessageId, setEditingMessageId] = useState(null);
      const [editingText, setEditingText] = useState('');
      const [drafts, setDrafts] = useState({});
      const [expandedChildLevels, setExpandedChildLevels] = useState({});
      const [childGeneratingId, setChildGeneratingId] = useState(null);
      const [previewOpenId, setPreviewOpenId] = useState(null);
      const [dailyUsed, setDailyUsed] = useState(0);
      const [dailyResetAt, setDailyResetAt] = useState(null);
      const [expandedReportDates, setExpandedReportDates] = useState({});
      const [localReports, setLocalReports] = useState({});
      const [showExportModal, setShowExportModal] = useState(false);
      const [showCalendarModal, setShowCalendarModal] = useState(false);
      const [showSettingsModal, setShowSettingsModal] = useState(false);
      const [apiKeyInput, setApiKeyInput] = useState('');
      const [calendarViewDate, setCalendarViewDate] = useState(new Date());
      const [existingReportDates, setExistingReportDates] = useState([]);
      const [isMobile, setIsMobile] = useState(false);
      const [appVersion, setAppVersion] = useState(APP_VERSION);
      const [selectedDocChildId, setSelectedDocChildId] = useState(null);
      const [showPreview, setShowPreview] = useState(false);
      const [selectedChildMessages, setSelectedChildMessages] = useState([]); // Derived from dailyMessages for UI
      const [touchStartPos, setTouchStartPos] = useState(null);

      // Save Helper
      const saveDailyData = async (date, currentChildren, currentMessages, currentResults, currentSummary) => {
        setIsSyncing(true);
        const packet = {
          children: currentChildren,
          messages: currentMessages,
          results: currentResults,
          summaryC: currentSummary,
          updatedAt: new Date().toISOString()
        };
        await callStorage({ action: 'saveReport', date: date, data: packet });

        // Also update global children roster if we are editing the "latest" or simply to keep master list updated
        // For simplicity, we always update global roster to match the current view (if intended)
        // OR we separate "Master Roster" from "Daily Roster".
        // The user wants "Date's Roster". If I add a child today, they should be in Master. 
        // Let's safe-guard: Update Master only if it's not a past date? 
        // User behavior implies "Persistence". Let's update Master too.
        await callStorage({ action: 'setChildren', data: currentChildren });

        setIsSyncing(false);
      };

      // Fetch Helpers
      const fetchGlobalChildren = useCallback(async () => {
        // This loads the "Master" list, used for new days
        const data = await callStorage({ action: 'getChildren' });
        return data || [];
      }, []);

      const fetchDailyData = useCallback(async (dateString) => {
        setIsSyncing(true);
        const data = await callStorage({ action: 'getReport', date: dateString });

        if (data && typeof data === 'object') {
          setResults(data.results || {});
          setSummaryC(data.summaryC || '');
          setDailyMessages(data.messages || {});

          // Children Snapshot
          if (data.children && Array.isArray(data.children)) {
            setChildren(data.children);
          } else {
            // Old report without children snapshot - treat as empty for this date
            setChildren([]);
          }
        } else {
          // New Date (no saved snapshot) - Start completely fresh
          setResults({});
          setSummaryC('');
          setDailyMessages({});
          setChildren([]); // Empty list - user builds from scratch for this date
        }
        setIsSyncing(false);
      }, []);

      const fetchReportIndex = useCallback(async () => {
        const data = await callStorage({ action: 'getReportIndex' });
        if (data) setExistingReportDates(data);
      }, []);

      // Generate version number: YY.MM.DD.N (N = update count for the day)
      useEffect(() => {
        // Version is now static based on APP_VERSION constant
        setAppVersion(APP_VERSION);
      }, []);

      useEffect(() => {
        let t;
        if (loading) {
          t = setInterval(() => {
            setSmoothProgress((p) => {
              const next = p + 2.5;
              return next >= 90 ? 90 : parseFloat(next.toFixed(1));
            });
          }, 180);
        } else {
          setSmoothProgress(0);
        }
        return () => t && clearInterval(t);
      }, [loading]);

      useEffect(() => {
        ensureQuotaReset();
      }, []);

      useEffect(() => {
        const update = () => setIsMobile(window.innerWidth < 768);
        update();
        window.addEventListener('resize', update);
        return () => window.removeEventListener('resize', update);
      }, []);

      useEffect(() => {
        const u = { uid: 'care-record-pro-netlify' };
        setUser(u);
        fetchReportIndex();
        fetchDailyData(selectedDate);
      }, [selectedDate]);

      // Derived UI State: Update messages view when child or dailyMessages changes
      useEffect(() => {
        if (selectedChildId) {
          const msgs = dailyMessages[selectedChildId] || [];
          setSelectedChildMessages(msgs);
        } else {
          setSelectedChildMessages([]);
        }
      }, [selectedChildId, dailyMessages]);

      // Polling: Refresh daily data periodically to keep in sync
      useEffect(() => {
        const timer = setInterval(() => {
          fetchReportIndex();
          fetchDailyData(selectedDate);
        }, 5000);
        return () => clearInterval(timer);
      }, [selectedDate]);

      // removed redundant polling for now to avoid overwriting edits



      // ローカルモードでも児童変更時に対象選択を同期
      useEffect(() => {
        const ids = children.map(c => c.id);
        setSelectedGenerateIds(prev => {
          const filtered = prev.filter(id => ids.includes(id));
          // If the list of children changed, or if our selection contains invalid IDs, refresh it
          if (filtered.length === prev.length && ids.length === prev.length) return prev;
          return Array.from(new Set(ids)); // Ensure unique
        });
      }, [children]);

      useEffect(() => {
        const raw = localStorage.getItem('care_pro_quota');
        if (raw) {
          try {
            const parsed = JSON.parse(raw);
            setDailyUsed(parsed.used || 0);
            setDailyResetAt(parsed.resetAt || null);
          } catch (e) { }
        }
      }, []);

      const persistQuota = (used, resetAt) => {
        setDailyUsed(used);
        setDailyResetAt(resetAt);
        localStorage.setItem('care_pro_quota', JSON.stringify({ used, resetAt }));
      };

      const ensureQuotaReset = () => {
        const now = new Date();
        const next9 = () => {
          const d = new Date();
          d.setHours(9, 0, 0, 0);
          if (d <= now) d.setDate(d.getDate() + 1);
          return d;
        };
        const reset = dailyResetAt ? new Date(dailyResetAt) : null;
        if (!reset || now >= reset) {
          const newReset = next9();
          persistQuota(0, newReset.toISOString());
        }
      };

      // Actions (Mocked if needed)
      const addChild = async () => {
        if (!user) return;
        try {
          // Robust ID generation
          const newId = (typeof crypto !== 'undefined' && crypto.randomUUID)
            ? crypto.randomUUID()
            : 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 11);

          const newChild = { id: newId, name: `新規児童`, timestamp: Date.now() };
          const newList = [...children, newChild];

          setChildren(newList);
          setSelectedGenerateIds(prev => Array.from(new Set([...prev, newId])));

          await saveDailyData(selectedDate, newList, dailyMessages, results, summaryC);
        } catch (e) {
          alert("児童の追加に失敗しました");
        }
      };

      const sendMessage = async (childId, text) => {
        if (!user || !text.trim() || !childId) return;
        const newMessage = {
          id: Date.now().toString(),
          text: text,
          timestamp: Date.now(),
          userId: user.uid,
          included: true
        };
        try {
          const currentChildMsgs = dailyMessages[childId] || [];
          const newMsgList = [...currentChildMsgs, newMessage];
          const newDailyMessages = { ...dailyMessages, [childId]: newMsgList };

          setDailyMessages(newDailyMessages);
          if (selectedChildId === childId) setSelectedChildMessages(newMsgList);

          await saveDailyData(selectedDate, children, newDailyMessages, results, summaryC);
        } catch (e) {
          alert("送信に失敗しました");
        }
      };

      const toggleMessage = async (childId, messageId) => {
        if (!user) return;
        try {
          const currentChildMsgs = dailyMessages[childId] || [];
          const newMsgList = currentChildMsgs.map(m => m.id === messageId ? { ...m, included: !m.included } : m);
          const newDailyMessages = { ...dailyMessages, [childId]: newMsgList };

          setDailyMessages(newDailyMessages);
          if (selectedChildId === childId) setSelectedChildMessages(newMsgList);

          await saveDailyData(selectedDate, children, newDailyMessages, results, summaryC);
        } catch (e) {

                onClick={e => e.stopPropagation()}
              >
                <div className="w-full max-w-lg">
                  {/* Header */}
                  <div className="flex items-center justify-between mb-8">
                    <button
                      onClick={() => {
                        const d = new Date(calendarViewDate);
                        d.setMonth(d.getMonth() - 1);
                        setCalendarViewDate(d);
                      }}
                      className="p-3 rounded-full hover:bg-slate-100 text-slate-500 hover:text-indigo-600 transition-colors"
                    >
                      <ChevronLeft className="w-6 h-6" />
                    </button>

                    <h2 className="text-2xl font-black text-indigo-900">
                      {calendarViewDate.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long' })}
                    </h2>

                    <button
                      onClick={() => {
                        const d = new Date(calendarViewDate);
                        d.setMonth(d.getMonth() + 1);
                        setCalendarViewDate(d);
                      }}
                      className="p-3 rounded-full hover:bg-slate-100 text-slate-500 hover:text-indigo-600 transition-colors"
                    >
                      <ChevronRight className="w-6 h-6" />
                    </button>
                  </div>

                  {/* Calendar Grid */}
                  <div className="grid grid-cols-7 gap-2 mb-6">
                    {/* Weekdays */}
                    {['日', '月', '火', '水', '木', '金', '土'].map((day, i) => (
                      <div key={day} className={`text-center text-xs font-bold py-2 ${i === 0 ? 'text-red-400' : i === 6 ? 'text-blue-400' : 'text-slate-400'}`}>
                        {day}
                      </div>
                    ))}

                    {/* Days */}
                    {(() => {
                      const year = calendarViewDate.getFullYear();
                      const month = calendarViewDate.getMonth();
                      const firstDay = new Date(year, month, 1).getDay();
                      const daysInMonth = new Date(year, month + 1, 0).getDate();

                      const days = [];

                      // Blank spaces for previous month
                      for (let i = 0; i < firstDay; i++) {
                        days.push(<div key={`blank-${i}`} className="aspect-square" />);
                      }

                      // Actual days
                      for (let d = 1; d <= daysInMonth; d++) {
                        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                        const isSelected = selectedDate === dateStr;
                        const isToday = dateStr === new Date().toISOString().split('T')[0];
                        const hasReport = existingReportDates.includes(dateStr);

                        days.push(
                          <button
                            key={d}
                            onClick={() => {
                              setSelectedDate(dateStr);
                              setShowCalendarModal(false);
                            }}
                            className={`
                               relative aspect-square rounded-2xl flex flex-col items-center justify-center font-bold text-sm transition-all
                               ${isSelected
                                ? 'bg-indigo-600 text-white shadow-lg scale-105 z-10'
                                : isToday
                                  ? 'bg-indigo-50 text-indigo-700 border-2 border-indigo-200'
                                  : 'hover:bg-slate-50 text-slate-700'
                              }
                             `}
                          >
                            <span className={isToday ? 'scale-110' : ''}>{d}</span>

                            {/* Indicators */}
                            <div className="flex gap-1 mt-1">
                              {hasReport && (
                                <div className={`w-1.5 h-1.5 rounded-full ${isSelected ? 'bg-white' : 'bg-emerald-500'}`} />
                              )}
                            </div>
                          </button>
                        );
                      }
                      return days;
                    })()}
                  </div>

                  <div className="flex items-center justify-center gap-6 text-xs text-slate-500 font-bold">
                    <div className="flex items-center gap-2">
                      <div className="w-2 h-2 rounded-full bg-emerald-500" />
                      <span>日報作成済み</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <div className="w-6 h-6 rounded-lg bg-indigo-50 border-2 border-indigo-200 flex items-center justify-center text-[10px] text-indigo-700">1</div>
                      <span>今日</span>
                    </div>
                  </div>

                  {/* Close Handle at Bottom */}
                  <div
                    className="absolute bottom-2 left-1/2 -translate-x-1/2 w-12 h-1 bg-slate-200 rounded-full"
                  />
                </div>

                {/* Close Button */}
                <button
                  onClick={() => setShowCalendarModal(false)}
                  className="mt-6 text-slate-400 hover:text-slate-600 font-bold text-sm flex items-center gap-2 px-6 py-2 rounded-full hover:bg-slate-100 transition-colors"
                >
                  <X className="w-4 h-4" /> 閉じる
                </button>
              </div>
            </div>

            {/* Settings Modal */}
            {showSettingsModal && (
              <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4" onClick={() => setShowSettingsModal(false)}>
                <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm" onClick={e => e.stopPropagation()}>
                  <div className="flex items-center gap-2 mb-4">
                    <Settings className="w-6 h-6 text-indigo-600" />
                    <h3 className="text-lg font-bold text-slate-800">設定</h3>
                  </div>

                  <div className="mb-4">
                    <label className="block text-xs font-bold text-slate-500 mb-1">Google Gemini API Key</label>
                    <div className="flex gap-2">
                      <input
                        type="password"
                        value={apiKeyInput}
                        onChange={(e) => setApiKeyInput(e.target.value)}
                        placeholder="AIzaSy..."
                        autoFocus
                        className="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-indigo-500 transition-colors"
                      />
                      <button
                        onClick={async () => {
                          try {
                            const text = await navigator.clipboard.readText();
                            if (text) setApiKeyInput(text);
                          } catch (e) {
                            alert("クリップボードの読み取りに失敗しました。\n(ブラウザの制限により動作しない場合があります)");
                          }
                        }}
                        className="px-3 py-2 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold hover:bg-slate-200 transition-colors flex items-center gap-1"
                        title="クリップボードから貼り付け"
                      >
                        <Clipboard className="w-4 h-4" />
                        <span className="hidden sm:inline">貼付</span>
                      </button>
                    </div>
                    <p className="text-[10px] text-slate-400 mt-1">※キーはブラウザ内にのみ保存されます</p>
                  </div>

                  <div className="flex gap-2">
                    <button
                      onClick={() => {
                        localStorage.setItem('care_pro_gemini_key', apiKeyInput.trim());
                        setShowSettingsModal(false);
                        alert("設定を保存しました");
                      }}
                      className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-bold transition-colors"
                    >
                      保存
                    </button>
                    <button
                      onClick={() => setShowSettingsModal(false)}
                      className="px-4 py-2 text-slate-400 hover:text-slate-600 text-sm font-bold"
                    >
                      閉じる
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Export Format Selection Modal */}
            {showExportModal && (
              <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4" onClick={() => setShowExportModal(false)}>
                <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm" onClick={e => e.stopPropagation()}>
                  <h3 className="text-lg font-bold text-slate-800 mb-4 text-center">出力形式を選択</h3>
                  <div className="space-y-3">
                    <button
                      onClick={() => {
                        exportToExcel();
                        setShowExportModal(false);
                      }}
                      className="w-full py-4 bg-emerald-50 hover:bg-emerald-100 border-2 border-emerald-200 rounded-xl flex items-center justify-center gap-3 transition-colors group"
                    >
                      <FileSpreadsheet className="w-8 h-8 text-emerald-600 group-hover:scale-110 transition-transform" />
                      <div className="text-left">
                        <p className="font-bold text-emerald-900">Excel形式 (.xlsx)</p>
                        <p className="text-xs text-emerald-600">レイアウトが整った標準形式</p>
                      </div>
                    </button>
                    <button
                      onClick={() => {
                        exportToCSV();
                        setShowExportModal(false);
                      }}
                      className="w-full py-4 bg-slate-50 hover:bg-slate-100 border-2 border-slate-200 rounded-xl flex items-center justify-center gap-3 transition-colors group"
                    >
                      <FileText className="w-8 h-8 text-slate-600 group-hover:scale-110 transition-transform" />
                      <div className="text-left">
                        <p className="font-bold text-slate-900">CSV形式 (.csv)</p>
                        <p className="text-xs text-slate-500">データ加工に適したテキスト形式</p>
                      </div>
                    </button>
                  </div>
                  <button
                    onClick={() => setShowExportModal(false)}
                    className="mt-6 w-full py-2 text-slate-400 hover:text-slate-600 text-sm font-bold"
                  >
                    キャンセル
                  </button>
                </div>
              </div>
            )}




          </div>
        </div >
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );

  </script>
</body>

</html>
