<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Care Record Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <!-- React & ReactDOM (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Firebase (Compat UMD) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- Lucide (Global) -->
  <script src="https://unpkg.com/lucide@0.330.0/dist/umd/lucide.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }

    /* Print Styles */
    @media print {
      body {
        background: white !important;
      }

      .no-print {
        display: none !important;
      }

      .print-only {
        display: block !important;
      }

      .print-page-break {
        page-break-after: always;
      }

      .print-avoid-break {
        page-break-inside: avoid;
      }

      @page {
        margin: 2cm;
        size: A4;
      }

      .print-header {
        display: block;
        text-align: center;
        font-weight: bold;
        font-size: 18px;
        margin-bottom: 20px;
        border-bottom: 2px solid #000;
        padding-bottom: 10px;
      }

      .print-section {
        margin-bottom: 30px;
      }

      .print-section h3 {
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 10px;
        border-bottom: 1px solid #333;
        padding-bottom: 5px;
      }

      .print-section p {
        font-size: 12px;
        line-height: 1.6;
        margin-bottom: 10px;
      }
    }

    .print-only {
      display: none;
    }
  </style>
</head>

<body>
  <script>
    window.onerror = function (msg, url, line, col, error) {
      // Show error on screen for debugging
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = `
          <div style="color: red; padding: 20px; font-family: monospace; background: #fff0f0; border: 2px solid red;">
            <h3>Application Error</h3>
            <p><strong>Message:</strong> ${msg}</p>
            <p><strong>Line:</strong> ${line}:${col}</p>
            <pre>${error ? error.stack : 'No stack trace'}</pre>
          </div>
        `;
      }
      return false;
    };
    window.onunhandledrejection = function (event) {
      console.error("Unhandled Rejection:", event.reason);
    };
  </script>
  <div id="root"></div>

  <script>
    window.__firebase_config = JSON.stringify({
      apiKey: "PLACEHOLDER_API_KEY",
      authDomain: "placeholder.firebaseapp.com",
      projectId: "placeholder-project",
      storageBucket: "placeholder.appspot.com",
      messagingSenderId: "000000000000",
      appId: "1:000000000000:web:000000000000000000"
    });
    window.__app_id = 'care-record-pro-local';
  </script>

  <script type="text/babel" data-presets="react">
    // --- UMD Globals Setup ---
    const { useState, useEffect } = React;
    const { createRoot } = ReactDOM;
    const { initializeApp } = firebase;
    const { getFirestore, collection, doc, onSnapshot, setDoc, updateDoc, deleteDoc, query, getDoc } = firebase.firestore;
    const { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = firebase.auth;
    const { icons } = lucide;

    const fetchAI = async (prompt, isJson) => {
      try {
        const response = await fetch('/.netlify/functions/gemini', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, isJson })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'AI呼び出しに失敗しました');

        if (isJson) return data.parsed || null;
        return data.text;
      } catch (e) {
        console.error(e);
        alert("AI生成エラー: " + e.message);
        return null;
      }
    };

    // Load Vanilla Lucide Icons

    // Lucide React Adapter
    const createIcon = (iconName, iconNode) => {
      const Component = ({ color = 'currentColor', size = 24, strokeWidth = 2, className, ...props }) => {
        const [tag, attrs, children] = iconNode;
        return React.createElement(
          tag,
          {
            ...attrs,
            width: size,
            height: size,
            stroke: color,
            strokeWidth: strokeWidth,
            className: `lucide lucide-${iconName} ${className || ''}`,
            ...props
          },
          children.map(([childTag, childAttrs], index) =>
            React.createElement(childTag, { ...childAttrs, key: index })
          )
        );
      };
      Component.displayName = iconName;
      return Component;
    };

    // Create adapter object for all icons
    const Lucide = Object.fromEntries(
      Object.entries(icons).map(([k, v]) => [k, createIcon(k, v)])
    );

    // Destructure icons needed by the user code
    const {
      Users, Clock, FileText, MessageSquare, UsersRound, Send, Loader2, Copy, Check,
      PlusCircle, Trash2, ClipboardCheck, RefreshCw, BookOpen, Coffee, Activity, Smile, Cloud, Clipboard,
      ShieldCheck, Printer, FileSpreadsheet, Sparkles, Calendar, X, ChevronLeft, ChevronRight
    } = Lucide;

    // --- App Code ---
    const firebaseConfig = JSON.parse(window.__firebase_config);

    // Error handling for Firebase Init (since config is mock)
    let app, auth, db;
    try {
      if (!firebaseConfig.apiKey || firebaseConfig.apiKey === "PLACEHOLDER_API_KEY") {
        console.log("Using Local Mode (No Firebase Config)");
        throw new Error("Skipping Firebase Init");
      }
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch (e) {
      console.log("Firebase init skipped/failed:", e.message);
    }

    const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'care-record-pro';
    const APP_VERSION = typeof window.__app_version !== 'undefined' ? window.__app_version : 'v0.1.0';

    const CopyButton = ({ text, id, label }) => {
      const [copied, setCopied] = useState(false);
      const handleCopy = () => {
        if (!text) return;
        const markCopied = () => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        };

        // Prefer async Clipboard API when available (requires HTTPS/localhost)
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(markCopied).catch((err) => {
            console.warn('Async clipboard failed, falling back:', err);
            fallbackCopy(text, markCopied);
          });
        } else {
          fallbackCopy(text, markCopied);
        }
      };

      // Fallback for http/file origins
      const fallbackCopy = (value, onSuccess) => {
        try {
          const textarea = document.createElement('textarea');
          textarea.value = value;
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          onSuccess();
        } catch (err) {
          console.error('Clipboard fallback failed:', err);
        }
      };
      return (
        <button onClick={handleCopy} className="text-slate-400 hover:text-indigo-600 transition-colors flex items-center gap-1" title="Copy">
          {copied ? <Check className="w-3 h-3 text-emerald-500" /> : <Copy className="w-3 h-3" />}
          {label && <span className="text-[10px] font-bold">{label}</span>}
        </button>
      );
    };


    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true };
      }

      componentDidCatch(error, errorInfo) {
        this.setState({ error, errorInfo });
        console.error("ErrorBoundary caught an error", error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-red-50 p-4">
              <div className="text-red-800 max-w-lg">
                <h1 className="text-2xl font-bold mb-4">エラーが発生しました</h1>
                <p className="mb-4">アプリケーションで予期せぬエラーが発生しました。</p>
                <details className="whitespace-pre-wrap font-mono text-xs bg-red-100 p-4 rounded mb-4 overflow-auto max-h-64">
                  {this.state.error && this.state.error.toString()}
                  <br />
                  {this.state.errorInfo && this.state.errorInfo.componentStack}
                </details>
                <button onClick={() => window.location.reload()} className="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 font-bold transition-colors shadow-sm">
                  ページを再読み込み
                </button>
              </div>
            </div>
          );
        }

        return this.props.children;
      }
    }


    const App = () => {
      // Mock user for demo if auth fails
      const [user, setUser] = useState(null);
      const [children, setChildren] = useState([]);
      const [results, setResults] = useState({});
      const [summaryC, setSummaryC] = useState('');
      const [selectedChildId, setSelectedChildId] = useState(null);
      const [selectedGenerateIds, setSelectedGenerateIds] = useState([]);
      const [loading, setLoading] = useState(false);
      const [activeTab, setActiveTab] = useState('input');
      const [copiedId, setCopiedId] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [progress, setProgress] = useState(0);
      const [smoothProgress, setSmoothProgress] = useState(0);
      const [editingMessageId, setEditingMessageId] = useState(null);
      const [editingText, setEditingText] = useState('');
      const [drafts, setDrafts] = useState({});
      const [expandedChildLevels, setExpandedChildLevels] = useState({});
      const [childGeneratingId, setChildGeneratingId] = useState(null);
      const [previewOpenId, setPreviewOpenId] = useState(null);
      const [dailyUsed, setDailyUsed] = useState(0);
      const [dailyResetAt, setDailyResetAt] = useState(null);
      const [expandedReportDates, setExpandedReportDates] = useState({});
      const [localReports, setLocalReports] = useState({});
      const [showExportModal, setShowExportModal] = useState(false);
      const [showCalendarModal, setShowCalendarModal] = useState(false);
      const [calendarViewDate, setCalendarViewDate] = useState(new Date());
      const [existingReportDates, setExistingReportDates] = useState([]);
      const [isMobile, setIsMobile] = useState(false);
      const [appVersion, setAppVersion] = useState('');
      const [selectedDocChildId, setSelectedDocChildId] = useState(null);
      const [showPreview, setShowPreview] = useState(false);

      // Generate version number: YY.MM.DD.N (N = update count for the day)
      useEffect(() => {
        const generateVersion = () => {
          const now = new Date();
          const year = String(now.getFullYear()).slice(-2); // Last 2 digits
          const month = String(now.getMonth() + 1).padStart(2, '0');
          const day = String(now.getDate()).padStart(2, '0');
          const dateKey = `${now.getFullYear()}-${month}-${day}`;

          // Get version count from localStorage
          const versionData = JSON.parse(localStorage.getItem('app_version_data') || '{}');

          if (versionData.date !== dateKey) {
            // New day, reset count
            versionData.date = dateKey;
            versionData.count = 1;
          } else {
            // Same day, increment count
            versionData.count = (versionData.count || 0) + 1;
          }

          localStorage.setItem('app_version_data', JSON.stringify(versionData));

          const version = `${year}.${month}.${day}.${versionData.count}`;
          setAppVersion(version);
        };

        generateVersion();
      }, []);

      useEffect(() => {
        let t;
        if (loading) {
          t = setInterval(() => {
            setSmoothProgress((p) => {
              const next = p + 2.5;
              return next >= 90 ? 90 : parseFloat(next.toFixed(1));
            });
          }, 180);
        } else {
          setSmoothProgress(0);
        }
        return () => t && clearInterval(t);
      }, [loading]);

      useEffect(() => {
        ensureQuotaReset();
      }, []);

      useEffect(() => {
        const update = () => setIsMobile(window.innerWidth < 768);
        update();
        window.addEventListener('resize', update);
        return () => window.removeEventListener('resize', update);
      }, []);

      useEffect(() => {
        if (!auth) {
          // If auth failed, simulate a user for UI demo
          setUser({ uid: 'demo-user' });
          return;
        }
        const initAuth = async () => {
          try {
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
              await signInWithCustomToken(auth, window.__initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (e) {
            console.warn("Auth failed, using demo user", e);
            setUser({ uid: 'demo-user' });
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => setUser(u || { uid: 'demo-user' }));
        return () => unsubscribe();
      }, []);

      // Sync Logic (Mocked if db fails)
      useEffect(() => {
        if (!user || !db) return;

        setIsSyncing(true);
        try {
          const childrenRef = collection(db, 'artifacts', appId, 'users', user.uid, 'children');
          const unsubscribeChildren = onSnapshot(childrenRef, (snapshot) => {
            const childrenData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setChildren(childrenData);
            if (childrenData.length > 0 && !selectedChildId) {
              setSelectedChildId(childrenData[0].id);
            }
            setSelectedGenerateIds(prev => {
              const ids = childrenData.map(c => c.id);
              const filtered = prev.filter(id => ids.includes(id));
              if (filtered.length === prev.length && filtered.length > 0) return prev;
              return ids; // default: 全員を対象に
            });
            setIsSyncing(false);
          }, (err) => {
            // console.error("Children Sync Error:", err);
            setIsSyncing(false);
          });

          // Sync based on selectedDate
          const resultsDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'daily_reports', selectedDate);
          const unsubscribeResults = onSnapshot(resultsDocRef, (docSnap) => {
            if (docSnap.exists()) {
              const data = docSnap.data();
              setResults(data.results || {});
              setSummaryC(data.summaryC || '');
            } else {
              setResults({});
              setSummaryC('');
            }
          }, (err) => { });

          return () => {
            unsubscribeChildren();
            unsubscribeResults();
          };
        } catch (e) {
          console.log("Firestore sync disabled/failed");
          setIsSyncing(false);
        }
      }, [user, selectedDate]); // Trigger re-sync on date change

      // Fetch list of dates with reports for Calendar
      useEffect(() => {
        if (!user) return;

        if (db) {
          // Firestore mode
          const reportsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'daily_reports');
          const unsubscribe = onSnapshot(reportsRef, (snapshot) => {
            const dates = snapshot.docs.map(doc => doc.id);
            setExistingReportDates(dates);
          });
          return () => unsubscribe();
        } else {
          // Local mode
          setExistingReportDates(Object.keys(localReports));
        }
      }, [user, db, localReports]);

      useEffect(() => {
        if (db) return;
        const report = localReports[selectedDate];
        if (report) {
          setResults(report.results || {});
          setSummaryC(report.summaryC || '');
        } else {
          setResults({});
          setSummaryC('');
        }
      }, [db, localReports, selectedDate]);

      // ローカルモードでも児童変更時に対象選択を同期
      useEffect(() => {
        const ids = children.map(c => c.id);
        setSelectedGenerateIds(prev => {
          const filtered = prev.filter(id => ids.includes(id));
          if (filtered.length === prev.length && filtered.length > 0) return prev;
          return ids;
        });
      }, [children]);

      useEffect(() => {
        const raw = localStorage.getItem('care_pro_quota');
        if (raw) {
          try {
            const parsed = JSON.parse(raw);
            setDailyUsed(parsed.used || 0);
            setDailyResetAt(parsed.resetAt || null);
          } catch (e) { }
        }
      }, []);

      const persistQuota = (used, resetAt) => {
        setDailyUsed(used);
        setDailyResetAt(resetAt);
        localStorage.setItem('care_pro_quota', JSON.stringify({ used, resetAt }));
      };

      const ensureQuotaReset = () => {
        const now = new Date();
        const next9 = () => {
          const d = new Date();
          d.setHours(9, 0, 0, 0);
          if (d <= now) d.setDate(d.getDate() + 1);
          return d;
        };
        const reset = dailyResetAt ? new Date(dailyResetAt) : null;
        if (!reset || now >= reset) {
          const newReset = next9();
          persistQuota(0, newReset.toISOString());
        }
      };

      // Actions (Mocked if needed)
      const addChild = async () => {
        if (!user) return;
        try {
          const newId = typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Date.now().toString();
          const newChild = { name: `新規児童`, messages: [], memo: '', timestamp: Date.now() };
          if (db) {
            await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'children', newId), newChild);
          } else {
            setChildren([...children, { id: newId, ...newChild }]);
          }
          // Don't auto-select on mobile - user will tap to open
          // setSelectedChildId(newId);
          setSelectedGenerateIds(prev => [...prev, newId]);
        } catch (e) {
          console.error("Add Child Error:", e);
          alert("児童の追加に失敗しました");
        }
      };

      const sendMessage = async (childId, text) => {
        if (!user || !text.trim()) return;
        const newMessage = {
          id: typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
          text: text,
          timestamp: Date.now(),
          userId: user.uid,
          included: true // Default to included
        };

        if (db) {
          const childRef = doc(db, 'artifacts', appId, 'users', user.uid, 'children', childId);
          const child = children.find(c => c.id === childId);
          const currentMessages = child?.messages || [];
          await updateDoc(childRef, { messages: [...currentMessages, newMessage] });
        } else {
          setChildren(children.map(c => {
            if (c.id === childId) {
              const currentMessages = c.messages || (c.memo ? [{ id: 'legacy', text: c.memo, timestamp: Date.now(), included: true }] : []);
              return { ...c, messages: [...currentMessages, newMessage], memo: '' };
            }
            return c;
          }));
        }
      };

      const toggleMessage = async (childId, messageId) => {
        if (!user) return;
        const child = children.find(c => c.id === childId);
        if (!child) return;

        const newMessages = (child.messages || []).map(m =>
          m.id === messageId ? { ...m, included: m.included === undefined ? false : !m.included } : m
        );

        if (db) {
          const childRef = doc(db, 'artifacts', appId, 'users', user.uid, 'children', childId);
          await updateDoc(childRef, { messages: newMessages });
        } else {
          setChildren(prev => prev.map(c => c.id === childId ? { ...c, messages: newMessages } : c));
        }
      };

      const updateMessageText = async (childId, messageId, newText) => {
        if (!user) return;
        const child = children.find(c => c.id === childId);
        if (!child) return;

        const newMessages = (child.messages || []).map(m =>
          m.id === messageId ? { ...m, text: newText } : m
        );

        if (db) {
          const childRef = doc(db, 'artifacts', appId, 'users', user.uid, 'children', childId);
          await updateDoc(childRef, { messages: newMessages });
        } else {
          setChildren(prev => prev.map(c => c.id === childId ? { ...c, messages: newMessages } : c));
        }
      };

      const updateChild = async (id, data) => {
        if (!user) return;
        if (db) {
          const childRef = doc(db, 'artifacts', appId, 'users', user.uid, 'children', id);
          await updateDoc(childRef, data);
        } else {
          setChildren(children.map(c => c.id === id ? { ...c, ...data } : c));
        }
      };

      const removeChild = async (id) => {
        if (!user) return;
        if (db) await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'children', id));
        else setChildren(children.filter(c => c.id !== id));

        const newResults = { ...results };
        delete newResults[id];
        saveResults(newResults, summaryC);

        if (children.length <= 1) setSelectedChildId(null);
        else if (selectedChildId === id) setSelectedChildId(children.find(c => c.id !== id)?.id || null);
        setSelectedGenerateIds(prev => prev.filter(cid => cid !== id));
      };

      const toggleChildGenerate = (id) => {
        setSelectedGenerateIds(prev => prev.includes(id) ? prev.filter(cid => cid !== id) : [...prev, id]);
      };

      const getMockResponse = (childName) => ({
        B_result: `ツリー式学習では文章問題に取り組んだ。苦戦する場面も見られたが、職員と一緒に文章や問題文を一文ずつ確認し、順を追って考えることができた。読み間違いはあったものの、答える前に「これで合っているか」と確認しながら進めるなど、丁寧に取り組む姿が見られた。制作ではシールのイラストに取り組み、参考画像を見比べながら色を慎重に選び、こだわって描こうとする様子が見られた。`,
        B_plan: `文章問題では、文を最後まで読み切ってから考える経験を重ねていく。制作活動では、参考を見ながら自分で選び決める過程を大切にし、集中して取り組める時間を少しずつ伸ばしていく。`,
        B_item: "①健康管理, ③社会性",
        D: `こんばんは！〇〇です！\nツリー通信をお送りします！\n\nツリー式学習では文章問題に挑戦しました。少し苦戦する場面もありましたが、スタッフと一緒に文章や問題文を少しずつ読み解きながら、順番に考えて解いていくことができました。文章はしっかり読もうとする姿が見られ、ところどころ読み間違える場面はありつつも、答える前に「これで合ってる？」と確認しながら丁寧に進めていましたよ。\n\n制作ではシールのイラストに取り組みました。参考にする写真探しに少し時間がかかり、作業量は多くはありませんでしたが、取り組めた場面では何度も参考の絵の色を見比べながら、「この色かな？」と慎重に色を決めて描く様子が見られました。こだわって丁寧に進めようとしていましたよ。`
      });

      const formatChatText = (text, width = 16) => {
        if (!text) return '';
        return text
          .split('\n')
          .map(line => {
            const segments = [];
            for (let i = 0; i < line.length; i += width) {
              segments.push(line.slice(i, i + width));
            }
            return segments.join('\n');
          })
          .join('\n');
      };

      const handleRegenerate = () => {
        if (loading) return;
        if (!window.confirm('生成し直しますか？')) return;
        generateDocuments();

      const generateDocuments = async () => {
        if (!user) return;

            const legacy = c.memo || '';
            const msgs = (c.messages || []).filter(m => m.included !== false).map(m => m.text).join('\n');
            return [legacy, msgs].filter(Boolean).join('\n').trim() !== '';

        const remaining = 20 - dailyUsed;

          alert("本日の残り生成回数がありません（リセットは9:00）");
          return;
        }
        if (toGenerate.length > remaining) {

          return;
        }
        setLoading(true);

          // 生成日付は今日の日付を使用

          const processedResults = { ...results };

          const getChildContent = (c) => {
            const legacy = c.memo || '';
            const msgs = (c.messages || [])
              .filter(m => m.included !== false) // Default to true if undefined
              .map(m => m.text)
              .join('\n');
            return [legacy, msgs].filter(Boolean).join('\n');
          };

          const childrenToProcess = toGenerate;

            setLoading(false);
            return;

          const totalOps = childrenToProcess.length + 1; // +1 for summary
          let completedOps = 0;
          setProgress(0);
          setSmoothProgress(0);

          for (const child of childrenToProcess) {
            const content = getChildContent(child);
            const prompt = `
          あなたは療育施設の事務担当です。以下の児童のメモを元に、2種類の書類を作成しJSONで返してください。

          児童名: ${child.name}

          【共通ルール】
          - セキュリティ保護のため、児童の実名や「〇〇君」「〇〇さん」などの呼称は一切使用しないでください。
          - 保護者宛の文章として、主語を省き、自然な言い回しで記述してください（例：「〇〇君は楽しみました」→「楽しんでいました」）。

          【1. 専門的支援実施計画】 (Keys: B_result, B_plan, B_item)
          - B_result (結果): 150〜180字。「〜だ・である」調の常体。事実に基づき「取り組む姿が見られた」「様子が見られた」「考えることができた」等、客観的かつ丁寧な観察描写にする。
          - B_plan (予定): 60〜80字。「〜していく」「〜を大切にする」など、方針を示す文末にする。
          - B_item (該当項目): ①〜⑤から該当するものを全て選択。

          【2. ツリー通信】 (Key: D)
          - 冒頭固定: こんにちは、〇〇です！ 今日のツリー通信です！
          - 文字数: 300文字前後
          - トーン: 保護者向けのやわらかい文章。療育記録調や専門用語は禁止。
          - 記述方針: 事実ベースで、評価や断定は避ける。「取り組む様子」「考える過程」「本人の選択」を大切に描写する。
          - 時系列で自然につなげる。
          - 否定的な表現は使わず、つまずきは「時間がかかった」「迷う様子」などで表現する。
          - 文末: 「ました。」「ましたよ。」などバリエーションをつける。
          - ※児童の実名は使用せず、主語を省いた自然な記述にすること。

          JSON形式で出力:
          {"B_result": "...", "B_plan": "...", "B_item": "...", "D": "..."}
        `;

                                      </div>
                                    </div>
                                    <p className="text-[10px] text-white/80 text-right mt-2 font-bold opacity-70">※LINE送信プレビュー（13文字改行）</p>
                                  </div>
                                </div>

                                {/* 専門的支援実施計画 */}
                                <div className="bg-slate-50 rounded-xl p-6 border-2 border-slate-200">
                                  <div className="flex items-center justify-between mb-4">
                                    <h3 className="font-black text-indigo-600 text-sm uppercase tracking-widest flex items-center gap-2">
                                      <FileText className="w-4 h-4" /> 専門的支援実施計画
                                    </h3>
                                    <CopyButton text={`実施した支援の内容・結果:\n${result.B_result || ''}\n\n今後の支援の予定:\n${result.B_plan || ''}\n\n該当項目:\n${result.B_item || ''}`} label="COPY" />
                                  </div>
                                  <div className="space-y-4">
                                    <div>
                                      <p className="text-xs font-bold text-slate-500 mb-2">実施した支援の内容・結果</p>
                                      <p className="text-sm font-medium text-slate-700 leading-7 whitespace-pre-wrap bg-white p-4 rounded-lg border">
                                        {result.B_result || '---'}
                                      </p>
                                    </div>
                                    <div>
                                      <p className="text-xs font-bold text-slate-500 mb-2">今後の支援の予定</p>
                                      <p className="text-sm font-medium text-slate-700 leading-7 whitespace-pre-wrap bg-white p-4 rounded-lg border">
                                        {result.B_plan || '---'}
                                      </p>
                                    </div>
                                    <div>
                                      <p className="text-xs font-bold text-slate-500 mb-2">該当項目</p>
                                      <p className="text-sm font-medium text-slate-700 leading-7 whitespace-pre-wrap bg-white p-4 rounded-lg border">
                                        {result.B_item || '---'}
                                      </p>
                                    </div>
                                  </div>
                                </div>
                              </div>


                              {/* Close button - Fixed at bottom right (Mobile only) */}
                              <button
                                onClick={() => setSelectedDocChildId(null)}
                                className="lg:hidden fixed bottom-6 right-6 w-14 h-14 bg-slate-900 text-white rounded-full shadow-2xl hover:bg-slate-700 transition-all flex items-center justify-center z-50 active:scale-95"
                              >
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                </svg>
                              </button>

                            </div>
                          );
                        })()
                      ) : (
                        <div className="bg-white rounded-2xl shadow-sm border h-full flex flex-col items-center justify-center text-slate-300">
                          <Users className="w-16 h-16 mb-4 opacity-10" />
                          <p className="font-black text-sm uppercase tracking-widest">児童を選択してください</p>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )
            }

            {/* Calendar Modal - Slide in from TOP */}
            <div
              className={`fixed inset-0 z-[100] transition-opacity duration-300 ${showCalendarModal ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}
            >
              {/* Backdrop */}
              <div
                className="absolute inset-0 bg-black/40 backdrop-blur-sm"
                onClick={() => setShowCalendarModal(false)}
              />

              {/* Modal Content */}
              <div
                className={`absolute top-0 left-0 right-0 bg-white shadow-2xl transition-transform duration-500 ease-out flex flex-col items-center pt-8 pb-10 px-4 rounded-b-3xl border-b border-indigo-100 ${showCalendarModal ? 'translate-y-0' : '-translate-y-full'}`}
                onClick={e => e.stopPropagation()}
              >
                <div className="w-full max-w-lg">
                  {/* Header */}
                  <div className="flex items-center justify-between mb-8">
                    <button
                      onClick={() => {
                        const d = new Date(calendarViewDate);
                        d.setMonth(d.getMonth() - 1);
                        setCalendarViewDate(d);
                      }}
                      className="p-3 rounded-full hover:bg-slate-100 text-slate-500 hover:text-indigo-600 transition-colors"
                    >
                      <ChevronLeft className="w-6 h-6" />
                    </button>

                    <h2 className="text-2xl font-black text-indigo-900">
                      {calendarViewDate.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long' })}
                    </h2>

                    <button
                      onClick={() => {
                        const d = new Date(calendarViewDate);
                        d.setMonth(d.getMonth() + 1);
                        setCalendarViewDate(d);
                      }}
                      className="p-3 rounded-full hover:bg-slate-100 text-slate-500 hover:text-indigo-600 transition-colors"
                    >
                      <ChevronRight className="w-6 h-6" />
                    </button>
                  </div>

                  {/* Calendar Grid */}
                  <div className="grid grid-cols-7 gap-2 mb-6">
                    {/* Weekdays */}
                    {['日', '月', '火', '水', '木', '金', '土'].map((day, i) => (
                      <div key={day} className={`text-center text-xs font-bold py-2 ${i === 0 ? 'text-red-400' : i === 6 ? 'text-blue-400' : 'text-slate-400'}`}>
                        {day}
                      </div>
                    ))}

                    {/* Days */}
                    {(() => {
                      const year = calendarViewDate.getFullYear();
                      const month = calendarViewDate.getMonth();
                      const firstDay = new Date(year, month, 1).getDay();
                      const daysInMonth = new Date(year, month + 1, 0).getDate();

                      const days = [];

                      // Blank spaces for previous month
                      for (let i = 0; i < firstDay; i++) {
                        days.push(<div key={`blank-${i}`} className="aspect-square" />);
                      }

                      // Actual days
                      for (let d = 1; d <= daysInMonth; d++) {
                        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                        const isSelected = selectedDate === dateStr;
                        const isToday = dateStr === new Date().toISOString().split('T')[0];
                        const hasReport = existingReportDates.includes(dateStr);

                        days.push(
                          <button
                            key={d}
                            onClick={() => {
                              setSelectedDate(dateStr);
                              setShowCalendarModal(false);
                            }}
                            className={`
                               relative aspect-square rounded-2xl flex flex-col items-center justify-center font-bold text-sm transition-all
                               ${isSelected
                                ? 'bg-indigo-600 text-white shadow-lg scale-105 z-10'
                                : isToday
                                  ? 'bg-indigo-50 text-indigo-700 border-2 border-indigo-200'
                                  : 'hover:bg-slate-50 text-slate-700'
                              }
                             `}
                          >
                            <span className={isToday ? 'scale-110' : ''}>{d}</span>

                            {/* Indicators */}
                            <div className="flex gap-1 mt-1">
                              {hasReport && (
                                <div className={`w-1.5 h-1.5 rounded-full ${isSelected ? 'bg-white' : 'bg-emerald-500'}`} />
                              )}
                            </div>
                          </button>
                        );
                      }
                      return days;
                    })()}
                  </div>

                  <div className="flex items-center justify-center gap-6 text-xs text-slate-500 font-bold">
                    <div className="flex items-center gap-2">
                      <div className="w-2 h-2 rounded-full bg-emerald-500" />
                      <span>日報作成済み</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <div className="w-6 h-6 rounded-lg bg-indigo-50 border-2 border-indigo-200 flex items-center justify-center text-[10px] text-indigo-700">1</div>
                      <span>今日</span>
                    </div>
                  </div>

                  {/* Close Handle at Bottom */}
                  <div
                    className="absolute bottom-2 left-1/2 -translate-x-1/2 w-12 h-1 bg-slate-200 rounded-full"
                  />
                </div>

                {/* Close Button */}
                <button
                  onClick={() => setShowCalendarModal(false)}
                  className="mt-6 text-slate-400 hover:text-slate-600 font-bold text-sm flex items-center gap-2 px-6 py-2 rounded-full hover:bg-slate-100 transition-colors"
                >
                  <X className="w-4 h-4" /> 閉じる
                </button>
              </div>
            </div>

            {/* Export Format Selection Modal */}
            {showExportModal && (
              <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4" onClick={() => setShowExportModal(false)}>
                <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm" onClick={e => e.stopPropagation()}>
                  <h3 className="text-lg font-bold text-slate-800 mb-4 text-center">出力形式を選択</h3>
                  <div className="space-y-3">
                    <button
                      onClick={() => {
                        exportToExcel();
                        setShowExportModal(false);
                      }}
                      className="w-full py-4 bg-emerald-50 hover:bg-emerald-100 border-2 border-emerald-200 rounded-xl flex items-center justify-center gap-3 transition-colors group"
                    >
                      <FileSpreadsheet className="w-8 h-8 text-emerald-600 group-hover:scale-110 transition-transform" />
                      <div className="text-left">
                        <p className="font-bold text-emerald-900">Excel形式 (.xlsx)</p>
                        <p className="text-xs text-emerald-600">レイアウトが整った標準形式</p>
                      </div>
                    </button>
                    <button
                      onClick={() => {
                        exportToCSV();
                        setShowExportModal(false);
                      }}
                      className="w-full py-4 bg-slate-50 hover:bg-slate-100 border-2 border-slate-200 rounded-xl flex items-center justify-center gap-3 transition-colors group"
                    >
                      <FileText className="w-8 h-8 text-slate-600 group-hover:scale-110 transition-transform" />
                      <div className="text-left">
                        <p className="font-bold text-slate-900">CSV形式 (.csv)</p>
                        <p className="text-xs text-slate-500">データ加工に適したテキスト形式</p>
                      </div>
                    </button>
                  </div>
                  <button
                    onClick={() => setShowExportModal(false)}
                    className="mt-6 w-full py-2 text-slate-400 hover:text-slate-600 text-sm font-bold"
                  >
                    キャンセル
                  </button>
                </div>
              </div>
            )}


            {/* Mobile Bottom Navigation - Fixed at bottom */}
            <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-[90] flex items-center justify-around pb-2 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
              <button
                onClick={() => setActiveTab('input')}
                className={`flex-1 py-3 flex flex-col items-center justify-center gap-1 transition-colors ${activeTab === 'input' ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}
              >
                <div className={`p-1 rounded-lg ${activeTab === 'input' ? 'bg-indigo-50' : 'bg-transparent'}`}>
                  <MessageSquare className={`w-5 h-5 ${activeTab === 'input' ? 'fill-indigo-200' : ''}`} />
                </div>
                <span className="text-[10px] font-bold">同時入力</span>
              </button>

              <button
                onClick={() => setActiveTab('docs')}
                className={`flex-1 py-3 flex flex-col items-center justify-center gap-1 transition-colors ${activeTab === 'docs' ? 'text-emerald-600' : 'text-slate-400 hover:text-slate-600'}`}
              >
                <div className={`p-1 rounded-lg ${activeTab === 'docs' ? 'bg-emerald-50' : 'bg-transparent'}`}>
                  <FileText className={`w-5 h-5 ${activeTab === 'docs' ? 'fill-emerald-200' : ''}`} />
                </div>
                <span className="text-[10px] font-bold">出力書類</span>
              </button>
            </div>


          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );

  </script>
</body>

</html>
