    const fetchAI = async (prompt, isJson) => {
      // Client-side Gemini Call for Local/Preview
      const callGeminiDirectly = async (apiKey, prompt, isJson) => {
        const MODEL = 'gemini-2.5-flash';
        const ENDPOINT = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`;

        const response = await fetch(ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.7 }
          })
        });

        const data = await response.json();
        if (!response.ok || data.error) {
          throw new Error(data.error?.message || 'Gemini API Error');
        }

        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        let parsed = null;
        if (isJson && text) {
          try {
            const jsonMatch = text.match(/\{[\s\S]*\}/);
            parsed = jsonMatch ? JSON.parse(jsonMatch[0]) : JSON.parse(text);
          } catch (_) { parsed = null; }
        }
        return isJson ? parsed : text;
      };

      try {
        // ALWAYS try to use the Local Storage API Config Key first if it exists.
        // This allows users to override the server-side function behavior or use it in preview environments without server functions.
        let apiKey = localStorage.getItem('care_pro_gemini_key');

        if (apiKey) {
          console.log("Using Configured API Key for Gemini (Client-side)");
          try {
            return await callGeminiDirectly(apiKey, prompt, isJson);
          } catch (geminiError) {
            console.error("Gemini Direct Call Error:", geminiError);

            // Specific handling for Quota Exceeded (429)
            if (geminiError.message && (geminiError.message.includes('429') || geminiError.message.includes('quota') || geminiError.message.includes('Quota'))) {
              alert("AIサービスの利用制限（回数制限）に達しました。\n\nしばらく時間（1分程度）を空けてから再度お試しください。\n※これは無料版APIの仕様です。");

    const createIcon = (iconName, iconNode) => {
      const Component = ({ color = 'currentColor', size = 24, strokeWidth = 2, className, ...props }) => {
        const [tag, attrs, children] = iconNode;
        return React.createElement(
          tag,
          {
            ...attrs,
            width: size,
            height: size,
            stroke: color,
            strokeWidth: strokeWidth,
            className: `lucide lucide-${iconName} ${className || ''}`,
            ...props
          },
          children.map(([childTag, childAttrs], index) =>
            React.createElement(childTag, { ...childAttrs, key: index })
          )
        );
      };
      Component.displayName = iconName;
      return Component;
    };

    const CopyButton = ({ text, id, label }) => {
      const [copied, setCopied] = useState(false);
      const handleCopy = () => {
        if (!text) return;
        const markCopied = () => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        };

        // Prefer async Clipboard API when available (requires HTTPS/localhost)
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(markCopied).catch((err) => {
            console.warn('Async clipboard failed, falling back:', err);
            fallbackCopy(text, markCopied);
          });
        } else {
          fallbackCopy(text, markCopied);
        }
      };

      // Fallback for http/file origins
      const fallbackCopy = (value, onSuccess) => {
        try {
          const textarea = document.createElement('textarea');
          textarea.value = value;
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          onSuccess();
        } catch (err) {
          console.error('Clipboard fallback failed:', err);
        }
      };
      return (
        <button onClick={handleCopy} className="text-slate-400 hover:text-indigo-600 transition-colors flex items-center gap-1" title="Copy">

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true };
      }

      componentDidCatch(error, errorInfo) {
        this.setState({ error, errorInfo });
        console.error("ErrorBoundary caught an error", error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-red-50 p-4">
              <div className="text-red-800 max-w-lg">
                <h1 className="text-2xl font-bold mb-4">エラーが発生しました</h1>

                  {this.state.error && this.state.error.toString()}

            </div>
          );

      // Firebase Storage Helper with /api/storage endpoint (prioritized) and LocalStorage Fallback
      const callStorage = async (payload) => {
        const performLocalAction = (payload) => {
          setConnectionStatus('local');

          const get = (k) => {
            try {
              return JSON.parse(localStorage.getItem('care_pro_local_' + k) || 'null');
            } catch (e) { return null; }
          };
          const set = (k, v) => localStorage.setItem('care_pro_local_' + k, JSON.stringify(v));

          switch (action) {
            case "getChildren":
              return get("children") || [];
            case "setChildren":
              set("children", data);
              return { status: "OK" };
            case "getMessages":
              return get(`messages_${childId}`) || [];
            case "saveMessages":
              set(`messages_${childId}`, data);
              return { status: "OK" };
            case "getReport":
              return get(`report_${date}`) || null;
            case "saveReport":
              set(`report_${date}`, data);
              let index = get("reports_index") || [];
              if (!Array.isArray(index)) index = [];
              if (!index.includes(date)) {
                index.push(date);
                set("reports_index", index);
              }
              return { status: "OK" };
            case "getReportIndex":
              return get("reports_index") || [];
            case "getArchive":
              return get("archive") || [];
            case "saveArchive":
              set("archive", data);
              return { status: "OK" };
            default:
              return null;

            });

            if (response.ok) {
              const result = await response.json();
              setConnectionStatus('online');
              setLastError(null);
              return result;
            } else {
              throw new Error(`API Error: ${response.status}`);
            }
          } catch (apiError) {
            console.warn('Storage API failed, falling back to direct database access:', apiError);

            // Fallback to direct Firebase Realtime Database (without encryption)
            const { action, data, childId, date } = payload;

            switch (action) {
              case "getChildren":
                const childrenSnapshot = await db.ref('children').once('value');
                setConnectionStatus('online');
                setLastError(null);

                setConnectionStatus('online');

                setLastError(null);

              default:
                return null;
            }

      const parseForceSheet = (text) => {
        const result = { learning: '', play: '', program: '', snack: '' };
        if (!text) return result;
        // Normalize text to handle newlines
        const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

        let currentSection = null;
        for (const line of lines) {
          // Check for headers (Standard or Bracketed)
          if (line.startsWith('学習:') || line.startsWith('【学習】')) {
            currentSection = 'learning';
            result.learning += (result.learning ? '\n' : '') + line.replace(/^(学習:|【学習】)\s*/, '');
          } else if (line.startsWith('自由遊び:') || line.startsWith('【自由遊び】')) {
            currentSection = 'play';
            result.play += (result.play ? '\n' : '') + line.replace(/^(自由遊び:|【自由遊び】)\s*/, '');
          } else if (line.startsWith('プログラム:') || line.startsWith('【プログラム】')) {
            currentSection = 'program';
            result.program += (result.program ? '\n' : '') + line.replace(/^(プログラム:|【プログラム】)\s*/, '');
          } else if (line.startsWith('おやつ:') || line.startsWith('【おやつ】')) {
            currentSection = 'snack';
            result.snack += (result.snack ? '\n' : '') + line.replace(/^(おやつ:|【おやつ】)\s*/, '');
          } else if (currentSection) {
            // Continuation of previous section
            result[currentSection] += '\n' + line;
          }
        }
        return result;

                    <button
                      onClick={() => setShowSettingsModal(false)}
                      className="px-4 py-2 text-slate-400 hover:text-slate-600 text-sm font-bold"
                    >
                      閉じる
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Export Format Selection Modal */}
            {showExportModal && (
              <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4" onClick={() => setShowExportModal(false)}>
                <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm" onClick={e => e.stopPropagation()}>
                  <h3 className="text-lg font-bold text-slate-800 mb-4 text-center">出力形式を選択</h3>
                  <div className="space-y-3">
                    <button
                      onClick={() => {
                        exportToExcel();
                        setShowExportModal(false);
                      }}
                      className="w-full py-4 bg-emerald-50 hover:bg-emerald-100 border-2 border-emerald-200 rounded-xl flex items-center justify-center gap-3 transition-colors group"
                    >
                      <FileSpreadsheet className="w-8 h-8 text-emerald-600 group-hover:scale-110 transition-transform" />
                      <div className="text-left">
                        <p className="font-bold text-emerald-900">Excel形式 (.xlsx)</p>
                        <p className="text-xs text-emerald-600">レイアウトが整った標準形式</p>
                      </div>
                    </button>
                    <button
                      onClick={() => {
                        exportToCSV();
                        setShowExportModal(false);
                      }}
                      className="w-full py-4 bg-slate-50 hover:bg-slate-100 border-2 border-slate-200 rounded-xl flex items-center justify-center gap-3 transition-colors group"
                    >
                      <FileText className="w-8 h-8 text-slate-600 group-hover:scale-110 transition-transform" />
                      <div className="text-left">
                        <p className="font-bold text-slate-900">CSV形式 (.csv)</p>
                        <p className="text-xs text-slate-500">データ加工に適したテキスト形式</p>
                      </div>
                    </button>
                  </div>
                  <button
                    onClick={() => setShowExportModal(false)}
                    className="mt-6 w-full py-2 text-slate-400 hover:text-slate-600 text-sm font-bold"
                  >
                    キャンセル
                  </button>
                </div>
              </div>
            )}
              {/* Trash Modal */}
              {showTrashModal && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-300">
                  <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden animate-in zoom-in-95 duration-300 flex flex-col max-h-[80vh]">
                    <div className="p-6 border-b flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <Trash2 className="w-6 h-6 text-slate-400" />
                        <h2 className="text-xl font-black text-slate-900">アーカイブ（ゴミ箱）</h2>
                      </div>
                      <button onClick={() => setShowTrashModal(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors">
                        <X className="w-5 h-5 text-slate-500" />
                      </button>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                      {archivedData.length === 0 ? (
                        <div className="py-12 text-center">
                          <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <Archive className="w-8 h-8 text-slate-200" />
                          </div>
                          <p className="text-slate-400 font-bold">アーカイブされたデータはありません</p>
                        </div>
                      ) : (
                        <div className="space-y-3">
                          {archivedData.map(item => (
                            <div key={item.id + item.deletedAt} className="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex flex-col gap-3 group transition-all hover:border-indigo-100">
                              <div className="flex items-center justify-between">
                                <div>
                                  <h3 className="font-bold text-slate-900">{item.name}</h3>
                                  <p className="text-[10px] text-slate-400 font-bold">
                                    削除: {new Date(item.deletedAt).toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}
                                  </p>
                                </div>
                                <div className="flex gap-1">
                                  {item.data.messages?.length > 0 && <span className="text-[9px] bg-white border border-slate-200 text-slate-500 px-1.5 py-0.5 rounded font-bold">{item.data.messages.length}件のメモ</span>}
                                  {item.data.results && <span className="text-[9px] bg-emerald-50 border border-emerald-100 text-emerald-600 px-1.5 py-0.5 rounded font-bold">書類有</span>}
                                </div>
                              </div>
                              
                              <div className="flex flex-col gap-2 bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest bg-slate-50 px-2 py-1 rounded w-fit">復元先の枠を選択</span>
                                <div className="grid grid-cols-4 gap-2">
                                  {children.filter(c => c.name === '未設定').slice(0, 8).map((slot, i) => (
                                    <button
                                      key={slot.id}
                                      onClick={() => restoreChild(item, slot.id)}
                                      className="py-2 bg-slate-50 border border-slate-200 rounded-lg text-[10px] font-black text-slate-600 hover:bg-indigo-600 hover:text-white hover:border-indigo-600 transition-all active:scale-95"
                                    >
                                      枠{i + 1}
                                    </button>
                                  ))}
                                  {children.filter(c => c.name === '未設定').length === 0 && (
                                    <p className="col-span-4 text-[10px] text-red-500 font-bold text-center">空き枠がありません</p>
                                  )}
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                    
                    <div className="p-4 bg-slate-50 border-t">
                      <p className="text-[10px] text-slate-400 text-center font-bold leading-relaxed">
                        ※アーカイブされたデータは削除から1週間後に自動消去されます。<br />
                        一度復元されたデータはアーカイブから削除されます。
                      </p>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );

  </script>
</body>

</html>
